<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa Jergas UTA - El glosario que te apaña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const UTA_DATA = [
            { term: "DAE", full: "Dirección de Asuntos Estudiantiles", category: "Servicios", description: "Esta es la unidad fundamental para el apoyo al alumnado en la universidad. Se encarga de gestionar beneficios como becas, programas de salud estudiantil, actividades deportivas y apoyo socioeconómico para asegurar el bienestar de los estudiantes durante su permanencia en la institución.", link: "https://webdae.uta.cl/" },
            { term: "DGII", full: "Dirección General de Investigación e Innovación", category: "Investigación", description: "Es la entidad responsable de liderar y coordinar la actividad científica dentro de la universidad. Su trabajo se enfoca en gestionar proyectos de investigación y potenciar la transferencia tecnológica para que el conocimiento generado en la UTA beneficie a la sociedad y al sector productivo regional.", link: "https://dgii.uta.cl/" },
            { term: "ANID", full: "Agencia Nacional de Investigación y Desarrollo", category: "Nacional", description: "Esta agencia estatal sustituyó a la antigua CONICYT y tiene como misión principal administrar los fondos públicos destinados a la ciencia y la tecnología. Además se encarga de otorgar las becas de postgrado para estudios de magíster y doctorado tanto en Chile como en el extranjero.", link: "https://www.anid.cl/" },
            { term: "FONDECYT", full: "Fondo Nacional de Desarrollo Científico y Tecnológico", category: "Investigación", description: "Corresponde al instrumento de financiamiento más importante para los investigadores en el país. Adjudicarse un proyecto de este fondo permite realizar investigaciones de alto nivel y otorga un reconocimiento académico significativo tanto al docente como a la universidad.", link: "https://www.anid.cl/concursos/fondecyt/" },
            { term: "PAES", full: "Prueba de Acceso a la Educación Superior", category: "Nacional", description: "Es el examen de selección que mide las competencias y habilidades de quienes desean ingresar a las universidades chilenas. Esta prueba reemplazó a los antiguos sistemas de admisión y es el requisito central para matricularse en las diversas carreras de pregrado que ofrece la UTA.", link: "https://demre.cl/portal-paes/que-es-paes" },
            { term: "GRATUIDAD", full: "Beneficio de Gratuidad Estatal", category: "Financiero", description: "Este derecho permite que los estudiantes pertenecientes a los grupos más vulnerables del país puedan cursar sus estudios superiores sin pagar matrícula ni arancel. El beneficio cubre la duración oficial de la carrera y ha facilitado el acceso a la educación superior para miles de familias en el norte grande.", link: "https://www.gratuidad.cl/" },
            { term: "DGDT", full: "Dirección de Gestión Digital y Transparencia", category: "Administración", description: "Se trata de la unidad institucional que asume el compromiso de conducir la gestión tecnológica, la transformación digital de los sistemas y asegurar los procesos de transparencia e información pública en la universidad.", link: "https://www.uta.cl/index.php/dgdt/" },
            { term: "MASMA", full: "Museo Arqueológico San Miguel de Azapa", category: "Cultura", description: "Este museo institucional resguarda el patrimonio cultural más relevante del extremo norte de Chile. Es reconocido a nivel mundial por conservar las momias de la cultura Chinchorro y funciona como un centro de investigación clave para entender las antiguas sociedades andinas.", link: "https://www.uta.cl/index.php/museo-arqueologico-san-miguel-de-azapa/" },
            { term: "DIDO", full: "Dirección General de Docencia de Pregrado", category: "Administración", description: "Esta dirección coordina de manera central la planificación y desarrollo de la docencia en la universidad. Su labor principal garantiza que los procesos formativos y el avance curricular de los estudiantes se realicen con los más altos estándares de calidad.", link: "https://www.uta.cl/index.php/direccion-de-docencia/" },
            { term: "UTAmed", full: "Entorno Virtual de Enseñanza-Aprendizaje", category: "Académico", description: "Esta es la plataforma oficial que funciona como el entorno virtual de aprendizaje para todas las carreras de la institución. Proporciona un espacio de mediación tecnológica donde docentes y estudiantes pueden interactuar, acceder a material bibliográfico, enviar trabajos y realizar evaluaciones a distancia.", link: "http://utamed.uta.cl/utamed/" },
            { term: "RRII", full: "Relaciones Internacionales", category: "Internacional", description: "Es la oficina encargada de internacionalizar la universidad mediante la firma de convenios y la gestión de becas de intercambio. Proporciona asesoría técnica a estudiantes y académicos que desean realizar estancias en instituciones extranjeras para fortalecer su formación profesional.", link: "https://www.facebook.com/rrii.uta/" },
            { term: "AMERICAN CORNER", full: "American Corner UTA", category: "Cultura", description: "Este espacio cultural es fruto de una alianza estratégica con la embajada de los Estados Unidos. Ofrece diversos recursos educativos gratuitos de excelente calidad, como cursos de inglés y talleres de innovación que buscan fomentar el intercambio cultural y nuevas habilidades.", link: "https://cl.usembassy.gov/education-culture/american-spaces/" },
            { term: "JAYMA", full: "Proyecto Jayma", category: "Cultura", description: "Esta iniciativa es un consorcio estratégico entre la UTA y la Universidad Católica que promueve la colaboración y transformación en las áreas de Artes, Humanidades y Ciencias Sociales. Su nombre hace honor al concepto aymara de trabajo colectivo en beneficio de la comunidad.", link: "https://www.uta.cl/index.php/2025/10/08/utarapaca-adjudico-el-primer-lugar-a-nivel-nacional-de-la-segunda-etapa-del-proyecto-jayma-conocimientos-2030-de-anid/" },
            { term: "CRISCOS", full: "Consejo de Rectores por la Integración de la Subregión Centro Oeste de Sudamérica", category: "Internacional", description: "Esta red de universidades sudamericanas impulsa la integración regional mediante programas de movilidad estudiantil. Permite que alumnos de la UTA realicen semestres de intercambio en universidades de países vecinos para enriquecer su experiencia cultural y académica.", link: "http://www.criscos.org/" },
            { term: "DAN", full: "Departamento de Antropología", category: "Departamento", description: "Es una unidad de excelencia académica dedicada al estudio científico de las sociedades antiguas y actuales. Su prestigio internacional se debe a sus investigaciones arqueológicas y antropológicas que han sido fundamentales para proteger el patrimonio del norte chileno.", link: "https://investigadores.uta.cl/es/organisations/departamento-de-antropolog%C3%ADa/" },
            { term: "BAES", full: "Beca de Alimentación para la Educación Superior", category: "Financiero", description: "Consiste en un subsidio mensual entregado por el estado a través de una tarjeta electrónica de Junaeb. Este beneficio permite a los estudiantes financiar sus gastos de alimentación en diversos comercios asociados y en los casinos de los campus universitarios.", link: "https://www.junaeb.cl/beca-baes" },
            { term: "TNE", full: "Tarjeta Nacional Estudiantil", category: "Servicios", description: "Este documento personal e intransferible permite a los estudiantes regulares acceder a tarifas rebajadas en el transporte público colectivo. El beneficio tiene vigencia durante todo el año y facilita el traslado de los alumnos a sus centros de estudio.", link: "https://www.tne.cl/" },
            { term: "LAP", full: "Laboratorio de Arqueología y Paleoambiente", category: "Investigación", description: "Es un espacio dedicado al estudio de las interacciones entre las poblaciones humanas del pasado y su entorno natural. Su labor es fundamental para reconstruir la historia ambiental y cultural de las antiguas sociedades andinas del norte de Chile.", link: "https://www.uta.cl/#investigacion" },
            { term: "IAI", full: "Instituto de Alta Investigación", category: "Investigación", description: "Es una entidad académica enfocada en desarrollar ciencia de frontera y estudios avanzados. Su objetivo es concentrar a investigadores de excelencia para potenciar la productividad científica y la proyección internacional de la universidad en diversas disciplinas.", link: "https://iai.uta.cl/" },
            { term: "LAIA", full: "Laboratorio de Análisis e Investigaciones Arqueométricas", category: "Investigación", description: "Este laboratorio se especializa en la aplicación de técnicas físicas y químicas para el estudio integral de materiales arqueológicos. Su trabajo multidisciplinario permite obtener datos precisos sobre la composición y el origen de los bienes culturales para fortalecer el análisis del patrimonio regional.", link: "https://laia.uta.cl/" }
        ];

        const IconWrapper = ({ name, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [search, setSearch] = useState('');
            const [cat, setCat] = useState('Todas');
            const [letter, setLetter] = useState(null);

            const categories = ['Todas', ...new Set(UTA_DATA.map(i => i.category))];
            const alphabet = "ABCDEFGHIJLMNOPQRSTUVWYZ".split("");

            const filtered = useMemo(() => {
                return UTA_DATA
                    .filter(i => (cat === 'Todas' || i.category === cat))
                    .filter(i => (!letter || i.term.startsWith(letter)))
                    .filter(i => (
                        i.term.toLowerCase().includes(search.toLowerCase()) || 
                        i.full.toLowerCase().includes(search.toLowerCase()) ||
                        i.description.toLowerCase().includes(search.toLowerCase())
                    ))
                    .sort((a, b) => a.term.localeCompare(b.term));
            }, [search, cat, letter]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-6">
                            <div className="flex justify-center mb-6">
                                <img src="https://www.uta.cl/wp-content/uploads/2018/11/logoweb_UTA.png" className="h-24 md:h-32 object-contain" />
                            </div>
                            <h1 className="text-4xl md:text-5xl font-extrabold text-blue-900 mb-2 italic uppercase">ATRAPA JERGAS UTA</h1>
                            <p className="text-slate-600 font-medium">El glosario que te ayuda a no perderte en el mundo universitario.</p>
                        </header>

                        <div className="flex h-1.5 w-full mb-10 overflow-hidden rounded-full">
                            <div className="w-1/4 h-full" style={{backgroundColor: '#f6c25e'}}></div>
                            <div className="w-1/4 h-full" style={{backgroundColor: '#4f5fa7'}}></div>
                            <div className="w-1/4 h-full" style={{backgroundColor: '#e68a3e'}}></div>
                            <div className="w-1/4 h-full" style={{backgroundColor: '#7ca0cf'}}></div>
                        </div>

                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8 sticky top-4 z-10">
                            <div className="flex items-center bg-slate-100 rounded-2xl px-4 py-3 mb-6">
                                <IconWrapper name="search" className="text-slate-400 mr-3 w-5 h-5" />
                                <input 
                                    type="text" 
                                    placeholder="¿Qué sigla te tiene confundida/o? Búscala aquí..."
                                    className="bg-transparent border-none outline-none w-full text-lg font-medium"
                                    value={search}
                                    onChange={e => {setSearch(e.target.value); setLetter(null);}}
                                />
                            </div>
                            <div className="flex flex-wrap gap-1 justify-center mb-6">
                                {alphabet.map(l => (
                                    <button key={l} onClick={() => {setLetter(letter === l ? null : l); setSearch('');}}
                                        className={`w-8 h-8 md:w-9 md:h-9 rounded-lg font-bold text-sm ${letter === l ? 'bg-blue-900 text-white shadow-md' : 'bg-slate-50 text-slate-400 hover:bg-slate-200'}`}>
                                        {l}
                                    </button>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2 justify-center border-t pt-6">
                                {categories.map(c => (
                                    <button key={c} onClick={() => setCat(c)}
                                        className={`px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wider ${cat === c ? 'bg-amber-400 text-blue-900 shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-200'}`}>
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid gap-4">
                            {filtered.length > 0 ? filtered.map((item, i) => (
                                <div key={i} className="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-400 hover:shadow-md transition-all group relative overflow-hidden">
                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-900 opacity-0 group-hover:opacity-100"></div>
                                    <div className="flex justify-between items-start mb-3">
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-2xl md:text-3xl font-black text-blue-900 leading-none">{item.term}</h2>
                                            <span className="px-3 py-1 bg-blue-50 text-blue-700 text-[10px] font-black uppercase rounded-full">{item.category}</span>
                                        </div>
                                        <a href={item.link} target="_blank" className="text-slate-300 hover:text-amber-500">
                                            <IconWrapper name="external-link" className="w-5 h-5" />
                                        </a>
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-2">{item.full}</h3>
                                    <p className="text-slate-600 leading-relaxed font-medium text-sm md:text-base">{item.description}</p>
                                </div>
                            )) : (
                                <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                    <p className="text-slate-400 text-lg font-bold">No se encontraron resultados.</p>
                                </div>
                            )}
                        </div>

                        <footer className="mt-20 py-10 text-center border-t border-slate-200">
                            <p className="text-slate-600 text-sm leading-relaxed max-w-2xl mx-auto mb-6">
                                Desarrollado con la ayuda de <span className="font-bold text-blue-900">Gemini Pro</span> por 
                                <a href="mailto:aoyaneder@academicos.uta.cl" className="mx-1 font-bold text-blue-700 hover:text-amber-600 underline">Adrián Oyaneder</a>, 
                                académico del departamento de Antropología y Proyecto Jayma (FACSO).
                            </p>
                            <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100 mb-10">
                                <p className="text-blue-900 font-bold mb-2 text-center">¿Quieres colaborar con este glosario institucional?</p>
                                <p className="text-blue-800 text-center text-sm">
                                    Envía un correo electrónico a <a href="mailto:aoyaneder@academicos.uta.cl" className="font-bold underline text-blue-900">aoyaneder@academicos.uta.cl</a> indicando el acrónimo junto con su definición completa y el enlace de referencia oficial.
                                </p>
                            </div>
                            <p className="text-slate-400 font-black uppercase tracking-widest text-[10px]">Universidad de Tarapacá · Arica e Iquique</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
